<div class="auth-container">
  <div class="auth-card">
    
    <div class="logo-auth">TransPort <span>Express</span></div>
    
    <h2>Connexion</h2>
    <p>Heureux de vous revoir ! Connectez-vous pour gérer vos réservations.</p>
    
    <!-- ✅ CORRECTION 1 : Ajout du [formGroup] (vérifie le nom dans ton .ts) -->
    <!-- ✅ CORRECTION 2 : Ajout du (ngSubmit) pour déclencher la connexion -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="input-group">
        <label>Email</label>
        <!-- ✅ CORRECTION 3 : Ajout du formControlName="email" -->
        <input 
          type="email" 
          formControlName="email" 
          placeholder="liessetresor@email.com" 
          [class.input-error]="inv('email')"
          required>
        <p *ngIf="inv('email')" class="text-red-500 text-xs mt-1">Email invalide</p>
      </div>

      <div class="input-group">
        <label class="label">Mot de passe</label>
        <div class="relative">
          <input 
            [type]="isPasswordVisible() ? 'text' : 'password'" 
            class="input pr-12" 
            [class.input-error]="inv('motDePasse')"
            formControlName="motDePasse" 
            placeholder="••••••••">
          
          <button 
            type="button" 
            (click)="togglePassword()" 
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-600 focus:outline-none">
            
            <svg *ngIf="isPasswordVisible()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>

            <svg *ngIf="!isPasswordVisible()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
            </svg>
          </button>
        </div>
        <p *ngIf="inv('motDePasse')" class="text-red-500 text-xs mt-1">Mot de passe requis</p>
      </div>

      <!-- ✅ CORRECTION 4 : Ajout du chargement et désactivation si invalide -->
      <button type="submit" [disabled]="form.invalid || chargement()" class="btn-auth">
        {{ chargement() ? 'Connexion...' : 'Se connecter' }}
      </button>

      <!-- Message d'erreur si le login échoue -->
      <p *ngIf="erreur()" class="text-red-600 text-center text-sm mt-2">{{ erreur() }}</p>

    </form>
    
    <div class="auth-footer">
      <span>Pas encore de compte ?</span>
      <a routerLink="/auth/register">Créer un compte</a>
    </div>
  </div>
</div>
