<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-6 text-center">
      <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-2">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m-8 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold">TransPort <span class="text-red-400">Express</span></h1>
      <p class="text-blue-100 text-sm">Créer votre compte voyageur</p>
    </div>

    <div class="px-8 py-8">
      
      <!-- Message d'erreur API -->
      <div *ngIf="erreur()" class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
        {{ erreur() }}
      </div>

      <!-- Formulaire -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <!-- Nom & Prénom -->
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col">
            <label class="text-sm font-semibold text-gray-700 mb-1">Nom</label>
            <input type="text" [class.border-red-500]="inv('nom')" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" formControlName="nom" placeholder="Ex: liesse">
            <p *ngIf="inv('nom')" class="text-red-500 text-xs mt-1">Requis</p>
          </div>
          <div class="flex flex-col">
            <label class="text-sm font-semibold text-gray-700 mb-1">Prénom</label>
            <input type="text" [class.border-red-500]="inv('prenom')" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" formControlName="prenom" placeholder="Ex: tresor">
            <p *ngIf="inv('prenom')" class="text-red-500 text-xs mt-1">Requis</p>
          </div>
        </div>

        <!-- Email -->
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input type="email" autocomplete="username" [class.border-red-500]="inv('email')" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" formControlName="email" placeholder="nom@exemple.com">
          <p *ngIf="inv('email')" class="text-red-500 text-xs mt-1">Email invalide</p>
        </div>

        <!-- Téléphone -->
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-1">Téléphone</label>
          <input type="tel" [class.border-red-500]="inv('telephone')" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" formControlName="telephone" placeholder="+237 6XX XXX XXX">
          <p *ngIf="inv('telephone')" class="text-red-500 text-xs mt-1">Requis</p>
        </div>

        <!-- Mot de passe -->
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
          <div class="relative">
            <input 
              [type]="isPasswordVisible() ? 'text' : 'password'" 
              [class.border-red-500]="inv('motDePasse')"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition pr-12" 
              formControlName="motDePasse" 
              placeholder="Min. 6 caractères">
            
            <button 
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-600">
              
              <!-- Oeil ouvert -->
              <svg *ngIf="isPasswordVisible()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>

              <!-- Oeil barré -->
              <svg *ngIf="!isPasswordVisible()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
          <p *ngIf="inv('motDePasse')" class="text-red-500 text-xs mt-1">Min. 6 caractères</p>
        </div>

        <!-- Bouton Submit -->
        <button type="submit" [disabled]="chargement() || form.invalid" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
          <svg *ngIf="chargement()" class="animate-spin h-5 w-5 mr-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ chargement() ? 'Création en cours...' : "Créer mon compte" }}
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Vous avez déjà un compte ?
        <a routerLink="/auth/login" class="text-blue-600 font-bold hover:underline">Se connecter</a>
      </p>
    </div>
  </div>
</div>
